name: Checks

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  checks:
    name: Check project
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build package
        run: nix build .#yandex-music --no-link

      - name: Build update script checks
        run: nix build .#checks.x86_64-linux.update-script --no-link

      - name: Check flake metadata
        run: nix flake check --no-build
