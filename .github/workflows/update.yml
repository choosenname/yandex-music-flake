name: Update

on:
  workflow_dispatch:
    inputs:
      version:
        description: Yandex Music version to package
        required: true
        type: string

permissions:
  contents: write

jobs:
  update:
    name: Update package metadata
    runs-on: ubuntu-latest

    steps:
      - name: Checkout master
        uses: actions/checkout@v6
        with:
          ref: master

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Update package metadata
        run: make update VERSION="${{ inputs.version }}"

      - name: Commit update
        run: .github/scripts/commit-yandex-music-update.sh "${{ inputs.version }}"
